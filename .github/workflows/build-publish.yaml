name: Build and Publish
on:
  push:
  release:
    types: [published]

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Extract version
        id: extract
        run: |
          version=$(grep -F Version backend/common/version.go | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            **/go.sum
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: false
      - uses: Buf generate
        run: |
          mise x -- buf generate --template buf.gen.runner.yaml
      - name: Check format
        run: |
          set -euo pipefail
          test "$(go fmt ./... | tee /dev/stderr | wc -l)" -eq 0
      - name: Go generate
        run: |
          set -euo pipefail
          for dir in $(go work edit -json | jq -r '.Use[] | .DiskPath'); do
            cd "${dir}"
            go generate ./...
            cd -
          done
      - name: Run test
        run: |
          for dir in $(go work edit -json | jq -r '.Use[] | .DiskPath'); do
            cd "${dir}"
            go test -v ./...
            cd -
          done

  build-test-tool:
    runs-on: ubuntu-latest
    needs:
      - go-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            **/go.sum
      - name: Build ostack-fake
        run: |
          cd backend/tools/ostack-fake
          go build -o ostack-fake .
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-tool
          path: ./backend/tools/ostack-fake/ostack-fake
          retention-days: 1

  build-runner:
    needs:
      - go-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            **/go.sum
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: false
      - uses: Buf generate
        run: |
          mise x -- buf generate --template buf.gen.runner.yaml
      - name: Go generate
        run: |
          set -euo pipefail
          for dir in $(go work edit -json | jq -r '.Use[] | .DiskPath'); do
            cd "${dir}"
            go generate ./...
            cd -
          done
      - name: Build
        run: |
          cd backend/runner
          ldflags="-X github.com/kofuk/premises/runner/internal/metadata.Revision=${COMMIT_HASH}"
          CGO_ENABLED=0 go build -o premises-runner -ldflags "${ldflags}" .
        env:
          COMMIT_HASH: ${{ github.sha }}
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: runner
          path: ./backend/runner/premises-runner
          retention-days: 1
      - name: Build Resources
        run: |
          cd backend/runner/resources/cmd
          go run . -input ../resources.json
      - name: Upload resources artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: runner-resources
          path: ./backend/runner/resources/cmd/resources.tar.zst
          retention-days: 1

  test-controlpanel-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: |
          pnpm install
      - name: Run lint
        run: |
          pnpm run lint
      - name: Run unit tests
        run: |
          pnpm test

  build-controlpanel:
    needs:
      - test-controlpanel-frontend
      - go-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        if: ${{ startsWith(github.ref_name, 'dependabot/') }}
        with:
          context: . # project root
          tags: ghcr.io/kofuk/premises:latest
          outputs: type=docker,dest=image.tar
          cache-from: type=gha
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        if: ${{ !startsWith(github.ref_name, 'dependabot/') }}
        with:
          context: . # project root
          tags: ghcr.io/kofuk/premises:latest
          outputs: type=docker,dest=image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: controlpanel-image
          path: image.tar
          retention-days: 1

  integ-test:
    runs-on: ubuntu-latest
    needs:
      - build-runner
      - build-controlpanel
      - build-test-tool
    services:
      object-storage:
        image: rustfs/rustfs:1.0.0-alpha.83@sha256:1cfa82fb394a7c6a4ffc24f5333b52afee608d258503f94b37fcce5cc965c896
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          -e RUSTFS_ACCESS_KEY=premises
          -e RUSTFS_SECRET_KEY=password
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.6
      - name: Download controlpanel Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: controlpanel-image
      - name: Make directory for tools
        run: |
          mkdir work
          echo "$(pwd)/work" >>"${GITHUB_PATH}"
      - name: Download runner
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: runner
          path: ./work
      - name: Download runner resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: runner-resources
          path: ./work
      - name: Download test tool
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-tool
          path: ./work
      - name: Load image
        run: docker load --input image.tar
      - name: Prepare binaries
        run: |
          mkdir /tmp/premises
          mv work/premises-runner /tmp/premises
          mv work/resources.tar.zst /tmp/premises
          chmod +x work/*
      - name: Launch ostack-fake
        run: |
          export DOCKER_API_VERSION="$(docker version --format '{{ .Server.APIVersion }}' | tee /dev/stderr)"
          export EXTRA_HOSTS='host.docker.internal:127.0.0.1'
          ostack-fake &
          for i in {1..20}; do
            curl -f http://localhost:8010/health && break
            sleep 3
          done
      - name: Create bucket
        run: |
          aws s3api create-bucket --bucket premises --endpoint-url http://localhost:9000
        env:
          AWS_ACCESS_KEY_ID: premises
          AWS_SECRET_ACCESS_KEY: password
          AWS_DEFAULT_REGION: auto
      - name: Launch app
        run: |
          docker compose --env-file tests/integ/test.env -f compose.yaml -f tests/integ/compose-test.yaml run --rm web /premises migrate
          docker compose --env-file tests/integ/test.env -f compose.yaml -f tests/integ/compose-test.yaml run --rm web pmctl user add -u admin -p password --initialized
          docker compose --env-file tests/integ/test.env -f compose.yaml -f tests/integ/compose-test.yaml up -d
          for i in {1..20}; do
            curl -f http://localhost:8000/health && break
            sleep 3
          done
      - name: Build base image for ostack-fake
        run: |
          ./etc/fake-runner/build_base_image.sh
      - name: Run test
        run: |
          export TARGET_HOST='http://localhost:8000'
          export USING_MCSERVER_FAKE='yes'

          cd tests/integ
          ./run_test.sh

  publish-binaries:
    runs-on: ubuntu-latest
    needs:
      - version
      - integ-test
    if: github.event_name == 'release'
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Download runner
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: runner
      - name: Download runner resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: runner-resources
      - name: Make binaries executable
        run: |
          chmod +x premises-runner
      - name: Create Archive
        run : |
          tar -czf "premises-runner@${VERSION}.tar.gz" premises-runner
          mv resources.tar.zst "premises-runner-resources@${VERSION}.tar.gz"
      - name: Generate metadata
        run: |
          echo ${{ github.sha }} >"version@${VERSION}.txt"
      - name: Upload Artifacts
        run: |
          aws s3 cp --checksum-algorithm CRC32 \
              "premises-runner@${VERSION}.tar.gz" s3://premises/artifacts/runner/
          aws s3 cp --checksum-algorithm CRC32 \
              "premises-runner-resources@${VERSION}.tar.gz" s3://premises/artifacts/runner/
          aws s3 cp --checksum-algorithm CRC32 \
              "version@${VERSION}.txt" s3://premises/artifacts/runner/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto

  publish-controlpanel-docker-image:
    runs-on: ubuntu-latest
    needs:
      - integ-test
      - publish-binaries
    if: github.event_name == 'release'
    permissions:
      packages: write
    steps:
      - name: Generate tag name
        run: |
          echo "IMAGE_TAG=${TAG_NAME#v}" >>"${GITHUB_ENV}"
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: controlpanel-image
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load image
        run: |
          docker load --input image.tar
          docker tag ghcr.io/kofuk/premises:latest "ghcr.io/kofuk/premises:${IMAGE_TAG}"
      - name: Push image
        run: |
          docker push "ghcr.io/kofuk/premises:${IMAGE_TAG}"
          docker push 'ghcr.io/kofuk/premises:latest'

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs:
      - integ-test
      - publish-controlpanel-docker-image
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Download existing index
        run: |
          aws s3 cp s3://premises/charts/index.yaml index.yaml || \
              helm repo index --url https://premises.kofuk.org/charts .
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
      - name: Package Helm chart
        run: helm package charts/premises
      - name: Add Helm chart to index
        run: helm repo index --merge index.yaml --url https://premises.kofuk.org/charts .
      - name: Upload Helm chart
        run: |
          aws s3 cp --checksum-algorithm CRC32 \
              premises-*.tgz s3://premises/charts/
          aws s3 cp --checksum-algorithm CRC32 \
              index.yaml s3://premises/charts/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
