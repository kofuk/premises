name: Build mcserver-fake
on:
  push:
    paths:
      - 'backend/tools/mcserver-fake/**'
      - 'etc/fake-version-manifest/**'

jobs:
  build-mcserver-fake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            **/go.sum
      - name: Build mcserver-fake
        run: |
          cd backend/tools/mcserver-fake
          CGO_ENABLED=0 go build .
      - name: Upload Artifacts
        if: github.ref_name == 'master'
        run: |
          aws s3 cp backend/tools/mcserver-fake/mcserver-fake s3://premises/artifacts/devtools/mcserver-fake/
          aws s3 cp --recursive etc/fake-version-manifest s3://premises/artifacts/devtools/mcserver-fake/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
